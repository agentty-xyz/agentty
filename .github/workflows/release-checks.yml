name: Release Checks

on:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust and `prek`
        uses: ./.github/actions/setup-rust-prek
        with:
          llvm-tools-preview: "true"

      - name: Default validation hooks
        run: uv tool run prek run --all-files

      - name: Strict lint
        run: uv tool run prek run clippy --all-files --hook-stage manual

      - name: Full test suite
        run: uv tool run prek run test-workspace --all-files --hook-stage manual
