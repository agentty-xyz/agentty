name: Presubmit

on:
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust and `prek`
        uses: ./.github/actions/setup-rust-prek
        with:
          cargo-audit: "true"

      - name: Default validation hooks
        run: prek run --all-files

      - name: Dependency advisory audit
        run: prek run cargo-audit --all-files --hook-stage manual

      - name: Full test suite
        run: prek run test-workspace --all-files --hook-stage manual
