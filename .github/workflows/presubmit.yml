name: Presubmit

on:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Rust and `prek`
        uses: ./.github/actions/setup-rust-prek
        with:
          cargo-audit: "true"

      - name: Default validation hooks
        run: prek run --all-files

      - name: Dependency advisory audit
        run: prek run cargo-audit --all-files --hook-stage manual

      - name: Full test suite
        run: prek run test-workspace --all-files --hook-stage manual
