name: Postsubmit

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Keep the active postsubmit run alive when newer pushes arrive.
  cancel-in-progress: false

jobs:
  source-tests:
    name: Source tests (${{ matrix.member }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - member: ag-forge
            hook: test-ag-forge-src
          - member: agentty
            hook: test-agentty-src
          - member: ag-xtask
            hook: test-ag-xtask-src
          - member: testty
            hook: test-testty-src

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup `uv`
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install `prek`
        run: uv tool install prek

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install `cargo-nextest`
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run source tests
        run: uv tool run prek run ${{ matrix.hook }} --all-files --hook-stage manual

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup `uv`
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install `prek`
        run: uv tool install prek

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Install `cargo-llvm-cov`
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Install `cargo-nextest`
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Generate coverage report
        run: uv tool run prek run coverage-lcov --all-files --hook-stage manual

      - name: Summarize coverage
        run: |
          # Summarize LCOV totals in the GitHub Actions run summary.
          awk '
            BEGIN {
              print "## Test coverage"
              print ""
              print "| Metric | Covered | Total | Coverage |"
              print "| --- | ---: | ---: | ---: |"
            }
            /^LF:/ { lines += substr($0, 4) }
            /^LH:/ { covered_lines += substr($0, 4) }
            /^FNF:/ { functions += substr($0, 5) }
            /^FNH:/ { covered_functions += substr($0, 5) }
            /^BRF:/ { branches += substr($0, 5) }
            /^BRH:/ { covered_branches += substr($0, 5) }
            END {
              report("Lines", covered_lines, lines)
              report("Functions", covered_functions, functions)
              if (branches > 0) {
                report("Branches", covered_branches, branches)
              }
            }
            function report(label, covered, total) {
              coverage = total == 0 ? "n/a" : sprintf("%.2f%%", covered * 100 / total)
              printf "| %s | %d | %d | %s |\n", label, covered, total, coverage
            }
          ' coverage.lcov >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: true
          files: coverage.lcov
          use_oidc: true

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup `uv`
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install `prek`
        run: uv tool install prek

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install `cargo-nextest`
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run end-to-end feature suite
        run: uv tool run prek run test-agentty-e2e --all-files --hook-stage manual
