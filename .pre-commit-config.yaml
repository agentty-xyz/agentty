repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=5120']

  - repo: local
    hooks:
      - id: mdformat
        name: mdformat
        description: Format Markdown files.
        entry: mdformat
        language: python
        additional_dependencies: [mdformat==0.7.22]
        files: \.(md|markdown)$
        exclude: ^skills/[^/]+/SKILL\.md$
      - id: djlint-reformat
        name: djlint reformat
        description: Format HTML files and embedded CSS blocks.
        entry: djlint --reformat --format-css
        language: python
        additional_dependencies: [djlint==1.36.4]
        files: \.html?$
      - id: rustfmt-fix
        name: rustfmt fix
        description: Format the code with rustfmt.
        entry: cargo fmt --all
        language: system
        types: [rust]
        pass_filenames: false
        stages: [manual]
      - id: clippy-fix
        name: clippy fix
        description: Auto-fix clippy lints where possible.
        entry: cargo clippy --fix --allow-dirty --allow-staged -q --all-targets --all-features -- -D warnings
        language: system
        files: (^|/)(Cargo\.toml|Cargo\.lock|.*\.rs)$
        pass_filenames: false
        stages: [manual]
      - id: rustfmt
        name: rustfmt check
        description: Verify code formatting with rustfmt.
        entry: cargo fmt --all --check
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-check
        name: cargo check
        description: Check the package for errors.
        entry: cargo check -q --locked --all-targets --all-features
        language: system
        files: (^|/)(Cargo\.toml|Cargo\.lock|.*\.rs)$
        pass_filenames: false
      - id: clippy
        name: clippy
        description: Lint the code and fail on any warnings.
        entry: cargo clippy -q --locked --all-targets --all-features -- -D warnings
        language: system
        files: (^|/)(Cargo\.toml|Cargo\.lock|.*\.rs)$
        pass_filenames: false
        stages: [manual]
      - id: test-workspace
        name: cargo test workspace
        description: Run the full workspace test suite with a shared-host thread budget.
        entry: >-
          bash -lc 'test_threads="$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 1)";
          test_threads=$((test_threads / 2));
          if [ "$test_threads" -lt 1 ]; then test_threads=1; fi;
          if [ "$test_threads" -gt 4 ]; then test_threads=4; fi;
          cargo test -q --locked -- --test-threads="$test_threads"'
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]
      - id: test-ag-forge-src
        name: cargo test ag-forge src
        description: Source tests for `crates/ag-forge/src`.
        entry: cargo test -q --locked -p ag-forge --lib
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]
      - id: test-agentty-src
        name: cargo test agentty src
        description: Source tests for `crates/agentty/src`.
        entry: cargo test -q --locked -p agentty --lib --bin agentty
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]
      - id: test-ag-xtask-src
        name: cargo test ag-xtask src
        description: Source tests for `crates/ag-xtask/src`.
        entry: cargo test -q --locked -p ag-xtask --bin ag-xtask
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]
      - id: test-testty-src
        name: cargo test testty src
        description: Source tests for `crates/testty/src`.
        entry: cargo test -q --locked -p testty --lib
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]
      - id: test-agentty-e2e
        name: cargo test agentty e2e
        description: Postsubmit-only `agentty` integration tests from `crates/agentty/tests`.
        entry: cargo test -q --locked -p agentty --test showcase --test protocol_compliance_e2e --test e2e -- --test-threads=1
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]
      - id: coverage
        name: coverage
        description: Verify workspace coverage meets ratchet thresholds.
        entry: cargo llvm-cov --workspace --summary-only --locked --fail-under-lines 89 --fail-under-functions 86
        language: system
        types: [rust]
        pass_filenames: false
        stages: [manual]
      - id: coverage-lcov
        name: coverage lcov
        description: Postsubmit-only workspace LCOV report for CI upload, excluding `crates/agentty/tests`.
        entry: cargo llvm-cov --workspace --lib --bins --lcov --ignore-filename-regex '^crates/agentty/tests/' --output-path coverage.lcov --locked
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]
      - id: cargo-shear
        name: cargo-shear
        description: Check for unused dependencies.
        entry: cargo shear
        language: system
        types: [rust]
        pass_filenames: false
        stages: [manual]
      - id: zola-check
        name: zola check
        description: Verify the docs site builds without broken links.
        entry: zola --root docs/site check
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]
      - id: check-migrations
        name: check migrations
        description: Verifies that migration files have unique prefix numbers.
        entry: cargo run -q --locked -p ag-xtask -- check-migrations
        language: system
        types: [sql]
        pass_filenames: false
      - id: check-roadmap
        name: check roadmap
        description: Verifies that the planning roadmap matches the active workflow rules.
        entry: cargo run -q --locked -p ag-xtask -- roadmap lint
        language: system
        pass_filenames: false
      - id: validate-prek-config
        name: validate prek config
        description: Validate the `prek` hook configuration when it changes.
        entry: prek validate-config .pre-commit-config.yaml
        language: system
        files: ^\.pre-commit-config\.yaml$
        pass_filenames: false
