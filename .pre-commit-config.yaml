repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=5120']

  - repo: local
    hooks:
      - id: mdformat
        name: mdformat
        description: Format Markdown files.
        entry: mdformat
        language: python
        additional_dependencies:
          - mdformat==0.7.22
          - mdformat-front-matters==2.0.0
        args: ['--wrap', '88']
        files: \.(md|markdown)$
        exclude: ^skills/[^/]+/SKILL\.md$
      - id: djlint-reformat
        name: djlint reformat
        description: Format HTML files and embedded CSS blocks.
        entry: djlint --reformat --format-css
        language: python
        additional_dependencies: [djlint==1.36.4]
        files: \.html?$
      - id: rustfmt-fix
        name: rustfmt fix
        description: Format all Rust workspace code with rustfmt before review.
        entry: cargo fmt --all
        language: system
        types: [rust]
        pass_filenames: false
        stages: [manual]
      - id: clippy-fix
        name: clippy fix
        description: Auto-fix clippy lints across Rust targets when a mechanical fix is available.
        entry: cargo clippy --fix --allow-dirty --allow-staged -q --all-targets --all-features -- -D warnings
        language: system
        files: (^|/)(Cargo\.toml|Cargo\.lock|.*\.rs)$
        pass_filenames: false
        stages: [manual]
      - id: rustfmt
        name: rustfmt check
        description: Verify all Rust workspace code is already formatted with rustfmt.
        entry: cargo fmt --all --check
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-check
        name: cargo check
        description: Type-check all Rust workspace targets and features without running tests.
        entry: cargo check -q --locked --all-targets --all-features
        language: system
        files: (^|/)(Cargo\.toml|Cargo\.lock|.*\.rs)$
        pass_filenames: false
      - id: clippy
        name: clippy
        description: Run strict clippy across all Rust targets and features, failing on warnings.
        entry: cargo clippy -q --locked --all-targets --all-features -- -D warnings
        language: system
        files: (^|/)(Cargo\.toml|Cargo\.lock|.*\.rs)$
        pass_filenames: false
      - id: test-workspace
        name: cargo nextest workspace
        description: Run the full workspace unit and integration test suite with `cargo-nextest`.
        entry: cargo nextest run --locked --profile ci --workspace
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]
      - id: test-ag-forge-src
        name: cargo nextest ag-forge src
        description: Source tests for `crates/ag-forge/src`.
        entry: cargo nextest run --locked --profile ci -p ag-forge --lib
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]
      - id: test-agentty-src
        name: cargo nextest agentty src
        description: Source tests for `crates/agentty/src`.
        entry: cargo nextest run --locked --profile ci -p agentty --lib --bin agentty
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]
      - id: test-ag-xtask-src
        name: cargo nextest ag-xtask src
        description: Source tests for `crates/ag-xtask/src`.
        entry: cargo nextest run --locked --profile ci -p ag-xtask --bin ag-xtask
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]
      - id: test-testty-src
        name: cargo nextest testty src
        description: Source tests for `crates/testty/src`.
        entry: cargo nextest run --locked --profile ci -p testty --lib
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]
      - id: test-agentty-e2e
        name: cargo nextest agentty e2e
        description: Postsubmit-only `agentty` integration tests from `crates/agentty/tests`.
        entry: >-
          cargo nextest run --locked --profile ci -p agentty
          --test showcase --test protocol_compliance_e2e --test e2e
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]
      - id: coverage
        name: coverage
        description: Verify source-test coverage meets workspace ratchet thresholds with `cargo-llvm-cov` and Nextest.
        entry: >-
          cargo llvm-cov nextest --workspace --lib --bins --locked --profile ci
          --fail-under-lines 91 --fail-under-functions 91
        language: system
        types: [rust]
        pass_filenames: false
        stages: [manual]
      - id: coverage-lcov
        name: coverage lcov
        description: Generate the postsubmit Nextest LCOV report uploaded to Codecov, excluding `crates/agentty/tests`.
        entry: >-
          cargo llvm-cov nextest --workspace --lib --bins --locked --profile ci
          --lcov --ignore-filename-regex '^crates/agentty/tests/'
          --output-path coverage.lcov
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]
      - id: cargo-shear
        name: cargo-shear
        description: Check workspace manifests for unused dependencies.
        entry: cargo shear
        language: system
        types: [rust]
        pass_filenames: false
        stages: [manual]
      - id: zola-check
        name: zola check
        description: Verify the Zola docs site builds without broken links.
        entry: zola --root docs/site check
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]
      - id: check-migrations
        name: check migrations
        description: Verify SQL migration files have unique prefix numbers.
        entry: cargo run -q --locked -p ag-xtask -- check-migrations
        language: system
        types: [sql]
        pass_filenames: false
      - id: check-roadmap
        name: check roadmap
        description: Verify that the planning roadmap matches the active workflow rules.
        entry: cargo run -q --locked -p ag-xtask -- roadmap lint
        language: system
        pass_filenames: false
      - id: validate-prek-config
        name: validate prek config
        description: Validate the `prek` hook catalog whenever `.pre-commit-config.yaml` changes.
        entry: prek validate-config .pre-commit-config.yaml
        language: system
        files: ^\.pre-commit-config\.yaml$
        pass_filenames: false
